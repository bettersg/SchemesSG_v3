<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schemes.sg — AI-Powered Search for Social Assistance in Singapore</title>
    <meta name="description" content="Discover social assistance schemes you're eligible for. AI-powered search across 500+ government and community schemes in Singapore." />
    <meta property="og:title" content="Schemes.sg — Find Social Assistance Schemes" />
    <meta property="og:description" content="AI-powered search to help you discover the social assistance schemes you deserve. Over 500 schemes from 200+ Singapore agencies." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://schemes.sg" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  </head>
  <body>
    <div id="root">
      <!-- Skeleton shimmer — replaced automatically when React mounts -->
      <style>
        .sk{position:relative;overflow:hidden;background:#e5e5e5;border-radius:8px}
        .sk::after{content:"";position:absolute;inset:0;transform:translateX(-100%);background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);animation:shimmer 1.6s infinite}
        @keyframes shimmer{100%{transform:translateX(100%)}}
        @media(prefers-reduced-motion:reduce){.sk::after{animation:none}}
        .sk-round{border-radius:9999px}
        .sk-sec{max-width:1280px;margin:0 auto;padding:80px 24px}
        .sk-hero{display:flex;flex-direction:column;align-items:center;padding:140px 24px 64px;max-width:560px;margin:0 auto}
        @media(min-width:1024px){.sk-hero{max-width:640px;padding-top:180px}}
        @media(min-width:768px){#sk-nav-pill{display:block!important}#sk-feat-grid{grid-template-columns:1fr 1fr!important}}
      </style>
      <div style="background:#fafafa">
        <!-- Navbar -->
        <div style="position:fixed;top:0;left:0;right:0;z-index:50;padding:16px 24px">
          <div style="max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between">
            <div class="sk sk-round" style="width:120px;height:28px"></div>
            <div class="sk sk-round" style="width:280px;height:36px;display:none" id="sk-nav-pill"></div>
            <div class="sk sk-round" style="width:72px;height:32px"></div>
          </div>
        </div>
        <!-- Hero -->
        <div class="sk-hero">
          <div class="sk sk-round" style="width:200px;height:28px;margin-bottom:32px"></div>
          <div class="sk sk-round" style="width:100%;height:44px;margin-bottom:12px"></div>
          <div class="sk sk-round" style="width:88%;height:44px;margin-bottom:12px"></div>
          <div class="sk sk-round" style="width:95%;height:44px;margin-bottom:12px"></div>
          <div class="sk sk-round" style="width:55%;height:44px;margin-bottom:28px"></div>
          <div class="sk sk-round" style="width:90%;height:18px;margin-bottom:8px"></div>
          <div class="sk sk-round" style="width:70%;height:18px;margin-bottom:36px"></div>
          <div class="sk" style="width:100%;max-width:512px;height:56px;border-radius:9999px"></div>
        </div>
        <!-- Featured logos -->
        <div style="border-top:1px solid #e5e5e5;padding:56px 24px;display:flex;flex-direction:column;align-items:center;gap:32px">
          <div class="sk sk-round" style="width:120px;height:14px"></div>
          <div style="display:flex;gap:48px;flex-wrap:wrap;justify-content:center">
            <div class="sk sk-round" style="width:80px;height:40px"></div>
            <div class="sk sk-round" style="width:90px;height:40px"></div>
            <div class="sk sk-round" style="width:70px;height:40px"></div>
            <div class="sk sk-round" style="width:85px;height:40px"></div>
            <div class="sk sk-round" style="width:75px;height:40px"></div>
            <div class="sk sk-round" style="width:60px;height:40px"></div>
          </div>
        </div>
        <!-- Features section -->
        <div style="background:#fff;padding:80px 24px">
          <div style="max-width:1280px;margin:0 auto;text-align:center">
            <div class="sk sk-round" style="width:340px;max-width:80%;height:36px;margin:0 auto 16px"></div>
            <div class="sk sk-round" style="width:480px;max-width:90%;height:18px;margin:0 auto 48px"></div>
            <div id="sk-feat-grid" style="display:grid;grid-template-columns:1fr;gap:24px">
              <div class="sk" style="height:280px;border-radius:16px"></div>
              <div class="sk" style="height:280px;border-radius:16px"></div>
              <div class="sk" style="height:200px;border-radius:16px"></div>
              <div class="sk" style="height:200px;border-radius:16px"></div>
            </div>
          </div>
        </div>
        <!-- Agencies -->
        <div class="sk-sec" style="text-align:center">
          <div class="sk sk-round" style="width:300px;max-width:70%;height:36px;margin:0 auto 12px"></div>
          <div class="sk sk-round" style="width:440px;max-width:85%;height:18px;margin:0 auto 40px"></div>
          <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:16px">
            <div class="sk sk-round" style="width:72px;height:72px;border-radius:12px"></div>
            <div class="sk sk-round" style="width:72px;height:72px;border-radius:12px"></div>
            <div class="sk sk-round" style="width:72px;height:72px;border-radius:12px"></div>
            <div class="sk sk-round" style="width:72px;height:72px;border-radius:12px"></div>
            <div class="sk sk-round" style="width:72px;height:72px;border-radius:12px"></div>
            <div class="sk sk-round" style="width:72px;height:72px;border-radius:12px"></div>
            <div class="sk sk-round" style="width:72px;height:72px;border-radius:12px"></div>
            <div class="sk sk-round" style="width:72px;height:72px;border-radius:12px"></div>
          </div>
        </div>
        <!-- Testimonials -->
        <div style="background:#fff;padding:80px 24px">
          <div style="max-width:1280px;margin:0 auto;display:grid;grid-template-columns:1fr;gap:32px" id="sk-test-grid">
            <div class="sk" style="height:240px;border-radius:16px"></div>
            <div class="sk" style="height:240px;border-radius:16px"></div>
          </div>
          <style>@media(min-width:768px){#sk-test-grid{grid-template-columns:1fr 1fr!important}}</style>
        </div>
        <!-- FAQ -->
        <div class="sk-sec" style="max-width:800px">
          <div class="sk sk-round" style="width:360px;max-width:80%;height:36px;margin:0 auto 16px"></div>
          <div class="sk sk-round" style="width:500px;max-width:90%;height:18px;margin:0 auto 48px"></div>
          <div style="display:flex;flex-direction:column;gap:12px">
            <div class="sk" style="height:52px;border-radius:12px"></div>
            <div class="sk" style="height:52px;border-radius:12px"></div>
            <div class="sk" style="height:52px;border-radius:12px"></div>
            <div class="sk" style="height:52px;border-radius:12px"></div>
            <div class="sk" style="height:52px;border-radius:12px"></div>
            <div class="sk" style="height:52px;border-radius:12px"></div>
          </div>
        </div>
        <!-- CTA -->
        <div style="background:#171717;padding:80px 24px;text-align:center">
          <div class="sk sk-round" style="width:320px;max-width:70%;height:36px;margin:0 auto 16px;background:#333"></div>
          <div class="sk sk-round" style="width:460px;max-width:85%;height:18px;margin:0 auto 8px;background:#333"></div>
          <div class="sk sk-round" style="width:380px;max-width:75%;height:18px;margin:0 auto 32px;background:#333"></div>
          <div class="sk sk-round" style="width:180px;height:44px;margin:0 auto;background:#444"></div>
        </div>
        <!-- Footer -->
        <div style="border-top:1px solid #e5e5e5;padding:48px 24px">
          <div style="max-width:1280px;margin:0 auto;display:flex;flex-wrap:wrap;gap:48px">
            <div class="sk sk-round" style="width:120px;height:24px"></div>
            <div style="display:flex;flex-direction:column;gap:12px">
              <div class="sk sk-round" style="width:80px;height:14px"></div>
              <div class="sk sk-round" style="width:60px;height:12px"></div>
              <div class="sk sk-round" style="width:70px;height:12px"></div>
            </div>
            <div style="display:flex;flex-direction:column;gap:12px">
              <div class="sk sk-round" style="width:90px;height:14px"></div>
              <div class="sk sk-round" style="width:50px;height:12px"></div>
              <div class="sk sk-round" style="width:65px;height:12px"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
